name: Deploy Next.js with PM2

on:
push:
branches:
- main

jobs:
deploy:
runs-on: ubuntu-latest

```
steps:
  - name: Deploy via SSH
    uses: appleboy/ssh-action@v1.0.3
    with:
      host: ${{ secrets.SSH_HOST }}
      username: ${{ secrets.SSH_USER }}
      key: ${{ secrets.SSH_KEY }}
      script: |
        cd ~/my-next-app
        git pull origin main
        npm install
        npm run build
        pm2 restart nextjs-app || pm2 start npm --name "nextjs-app" -- start -i max
```
